<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — Cipher &amp; Crown Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 10rem);
      color: var(--gold-dim);
      line-height: 1;
      opacity: 0.3;
      display: block;
      margin-bottom: 1rem;
    }
    .error-page h1 {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      color: var(--white);
      margin-bottom: 1rem;
    }
    .error-page p {
      font-family: var(--font-prose);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--gold);
      max-width: 500px;
      margin: 0 auto 2.5rem;
    }
  </style>
</head>
<body data-page="">
<canvas id="canvas-bg" aria-hidden="true"></canvas>
<div id="nav-placeholder"></div>

<main>
  <div class="error-page">
    <div>
      <span class="error-code glitch" data-text="404">404</span>
      <h1>Page Not Found</h1>
      <p>"Even the ravens sometimes lose their way. But they always return to the Tower."</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-gold">⚔ Return to the Keep</a>
        <a href="contacts.html" class="btn btn-outline">✉ Send a Raven</a>
      </div>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
